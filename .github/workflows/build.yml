name: Build OpenWrt for WRC-X3200GST3

on:
  workflow_dispatch:
    inputs:
      openwrt_tag:
        description: 'OpenWrt tag (e.g. v25.12.4). Leave empty for latest v25.xx'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 22 * * 5'

env:
  TARGET: mediatek/mt7622
  DEVICE: elecom_wrc-x3200gst3

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve OpenWrt tag
        id: resolve
        run: |
          if [ -n "${{ inputs.openwrt_tag }}" ]; then
            echo "tag=${{ inputs.openwrt_tag }}" >> $GITHUB_OUTPUT
          else
            # Fetch latest v25.xx release tag from GitHub API
            TAG=$(curl -sL https://api.github.com/repos/openwrt/openwrt/releases \
              | jq -r '.[].tag_name | select(startswith("v25."))' \
              | head -1)
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "Resolved latest v25.xx tag: ${TAG}"
          fi

  build:
    needs: resolve-tag
    runs-on: ubuntu-latest
    env:
      OPENWRT_TAG: ${{ needs.resolve-tag.outputs.tag }}

    steps:
      - name: Checkout builder config
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ env.OPENWRT_TAG }}
          path: openwrt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-setuptools rsync swig unzip zlib1g-dev \
            file wget cpio jq

      - name: Apply DTS patch
        run: |
          cd openwrt
          patch -p1 < ../builder/patches/target/linux/mediatek/dts/001-expand-ubi.patch

      - name: Add init script
        run: |
          cd openwrt
          cp -r ../builder/files/* . 2>/dev/null || true

      - name: Configure
        run: |
          cd openwrt
          cp ../builder/configs/elecom_wrc-x3200gst3.config .config
          make defconfig

      - name: Build
        run: |
          cd openwrt
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.OPENWRT_TAG }}-${{ env.DEVICE }}
          path: openwrt/bin/targets/${{ env.TARGET }}/*-sysupgrade.*
          retention-days: 30
